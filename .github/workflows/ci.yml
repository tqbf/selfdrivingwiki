name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          xcrun --show-sdk-path
          which swift || echo "swift not in PATH"
          swift --version || xcrun swift --version
      - name: Generated prompts are fresh
        run: make check-prompts
      - name: Build
        run: swift build || xcrun swift build
      - name: Test (fast tier — slow SQLite suites skipped, issue #292)
        # CI runs only the fast tier. The slow SQLite integration suites
        # (tagged .integration in Tests/WikiFSTests/TestTags.swift) are skipped
        # by name: `swift test` does not yet filter by tag (SwiftPM's --skip is
        # name-regex only; tag filtering is xcodebuild-only). The full suite
        # (including these) must be run locally before merge — see AGENTS.md.
        # ProjectionTreeTests un-skipped after #291 (ReadScope): ~32 s on CI
        # hardware (~2–3x slower), down from 165 s+ per working-set test.
        env:
          SKIP: 'EnumeratorDeletionTests|SQLiteWikiStoreTests|StoreEmissionTests|FreshSchemaParityTests|SQLiteStatementLifecycleIntegrationTests'
        run: swift test --skip "$SKIP" || xcrun swift test --skip "$SKIP"

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdf2md
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check pdf2md tests/
      - name: Type check
        run: uv run pyright pdf2md tests/
      - name: Unit tests
        run: uv run pytest tests/test_pdf2md.py -v
