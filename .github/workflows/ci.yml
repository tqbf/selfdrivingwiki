name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift:
    # Full `swift test` — no skip, no tier split. The in-memory SQLite
    # fixtures (#658) reduced the full suite from 30+ min to ~1.5 min, so the
    # fast/integration tier split and `.integration` tags are no longer needed.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (mlx-swift needs Swift 6.3)
        run: |
          # macos-latest may default the `swift` command to the CLT toolchain
          # (Swift 6.1), but mlx-swift 0.31.x requires 6.3. Force Xcode.
          ls /Applications/Xcode*.app 2>/dev/null
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | tail -1)" || true
          swift --version || xcrun swift --version
      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          xcrun --show-sdk-path
          which swift || echo "swift not in PATH"
          swift --version || xcrun swift --version
      - name: Generate codegen files (version + prompts)
        run: make version prompts
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          # Key on Package.resolved ONLY. The previous key also hashed
          # `Sources/**/*.swift`, producing one cache entry per commit and
          # blowing past GitHub's 10 GB/repo LRU — every run evicted and
          # cold-built MLX C++ (~1374 units, ~15 min). One entry per dep set
          # stops the eviction; warm build is ~2 min.
          key: ${{ runner.os }}-swift-v3-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - name: Build
        # The "Select Xcode" step above ran `sudo xcode-select -s`, so one
        # toolchain works directly. The previous `if xcrun swift build
        # 2>/dev/null; else swift build` probe swallowed failure reasons and
        # the `else` branch could trigger a second full recompile.
        run: xcrun swift build
      - name: Test (full suite minus blocking suites — in-memory fixtures, #658)
        # The full suite runs in ~1.5 min via in-memory SQLite fixtures (#658).
        # HOWEVER: a set of suites block the cooperative thread pool on CI's
        # 3-vCPU runner, causing a deadlock that .timeLimit cannot interrupt
        # (DispatchSemaphore.wait in production code, Process.waitUntilExit,
        # WKWebView/NSWindow on @MainActor). These suites pass locally (8+ vCPU)
        # and are covered by `make test` before every PR — CI skips them to
        # avoid the 30-min timeout. See plans/ci-speedup.md, #732, #448.
        #
        # `--parallel` is safe with the skip list — no suite can starve the pool.
        # timeout-minutes: 30 is a safety net for a cache-miss full rebuild.
        timeout-minutes: 30
        env:
          SKIP: 'CLITantivyLegResolverTests|TantivySmokeTests|TantivyShadowIndexTests|TantivyBM25LegCutoverTests|TantivyAutocompleteTests|RunAwaitsTurnTests|SourceEmbeddingSearchTests|PdfExtractionServiceTests|YouTubeEmbedWebViewTests|QuoteHighlightWebViewTests|SplitDiffSnapshotTests|BlobSchemeHandlerTests|ReaderRenderPerfTests|TransclusionEmbedTests|PageDetailViewHostedTests|PageVersionTests|EnumeratorDeletionTests|StoreEmissionTests|StoreEmissionReentrancyTests|BlobVacuumTests|AgentCASTests|GenerationGateLaneTests|WorkspaceStagingTests|WorkspaceMergeCompletenessTests|IngestIsolationTests|IngestGateTests|ChatSummaryTests|ProjectionTreeTests|FullTextSearchTests|ChatSearchTests|SessionManagerTests|SidebarDropBuilderIntegrationTests|MediaEmbedPlayerTests|Phase6PinningModelTests|DropLinkTextViewDropTests|ComposerTextViewTests|EditorAutocompleteHostedTests|ComposerAutocompleteHostedTests|ChatAutocompleteSelectionTests|ChatAutocompletePanelPlacementTests|ActivityPermissionPendingRowTests|AddressBarLayoutHostedTests|BookmarkInsertPositionTests|SidebarDragPasteboardBridgeTests|SidebarSelectAllShortcutTests|SourceDetailWebViewMenuTests|SourceWebAnchorTests|FootnoteAnchorTests|RetryStuckRegressionTests|ExternalWriteBookmarkRefreshTests|ExternalWriteDraftRefreshTests'
        run: xcrun swift test --parallel --filter WikiFSCoreTests --skip "$SKIP"

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdf2md
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check pdf2md tests/
      - name: Type check
        run: uv run pyright pdf2md tests/
      - name: Unit tests
        run: uv run pytest tests/test_pdf2md.py -v
