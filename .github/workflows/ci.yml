name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift:
    # Full `swift test` — no skip, no tier split. The in-memory SQLite
    # fixtures (#658) reduced the full suite from 30+ min to ~1.5 min, so the
    # fast/integration tier split and `.integration` tags are no longer needed.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (mlx-swift needs Swift 6.3)
        run: |
          # macos-latest may default the `swift` command to the CLT toolchain
          # (Swift 6.1), but mlx-swift 0.31.x requires 6.3. Force Xcode.
          ls /Applications/Xcode*.app 2>/dev/null
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | tail -1)" || true
          swift --version || xcrun swift --version
      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          xcrun --show-sdk-path
          which swift || echo "swift not in PATH"
          swift --version || xcrun swift --version
      - name: Generate codegen files (version + prompts)
        run: make version prompts
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          # Key on Package.resolved ONLY. The previous key also hashed
          # `Sources/**/*.swift`, producing one cache entry per commit and
          # blowing past GitHub's 10 GB/repo LRU — every run evicted and
          # cold-built MLX C++ (~1374 units, ~15 min). One entry per dep set
          # stops the eviction; warm build is ~2 min.
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
      - name: Build
        # The "Select Xcode" step above ran `sudo xcode-select -s`, so one
        # toolchain works directly. The previous `if xcrun swift build
        # 2>/dev/null; else swift build` probe swallowed failure reasons and
        # the `else` branch could trigger a second full recompile.
        run: xcrun swift build
      - name: Test (full suite — in-memory fixtures, #658)
        # The full suite runs in ~1.5 min via in-memory SQLite fixtures (#658);
        # the previous fast/integration tier split + `.integration` tags are
        # retired (no slow disk I/O to skip). See AGENTS.md.
        # `--parallel` is safe now that the CheckedContinuation suites
        # (`QueueExtractionTests`, `ACPTurnRecoveryTests`, `ACPWiringTests`,
        # `QueueEngineTests`) carry per-suite `.timeLimit(.minutes(2))` guards
        # — see #664 / `ACPPermissionTimeoutTests`. No suite can hang >2 min.
        # timeout-minutes: 30 is a safety net for a cache-miss full rebuild.
        timeout-minutes: 30
        run: xcrun swift test --parallel

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdf2md
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check pdf2md tests/
      - name: Type check
        run: uv run pyright pdf2md tests/
      - name: Unit tests
        run: uv run pytest tests/test_pdf2md.py -v
