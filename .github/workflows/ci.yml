name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (mlx-swift needs Swift 6.3)
        run: |
          # macos-latest may default the `swift` command to the CLT toolchain
          # (Swift 6.1), but mlx-swift 0.31.x requires 6.3. Force Xcode.
          ls /Applications/Xcode*.app 2>/dev/null
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | tail -1)" || true
          swift --version || xcrun swift --version
      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version
          xcrun --show-sdk-path
          which swift || echo "swift not in PATH"
          swift --version || xcrun swift --version
      - name: Generate codegen files (version + prompts)
        run: make version prompts
      - name: Build
        # Select the swift command that works on this runner and export it so
        # the Test step uses the SAME toolchain (a mismatch forces a full
        # recompile — the old `xcrun ... || swift ...` on Test doubled runtime).
        run: |
          if xcrun swift build 2>/dev/null; then
            echo "SWIFT=xcrun swift" >> "$GITHUB_ENV"
          else
            swift build
            echo "SWIFT=swift" >> "$GITHUB_ENV"
          fi
      - name: Test (fast tier — slow SQLite suites skipped, issue #292)
        # Fast tier — quick PR feedback. The slow SQLite integration suites
        # (tagged .integration in Tests/WikiFSTests/TestTags.swift) are skipped
        # by name: `swift test` does not yet filter by tag (SwiftPM's --skip is
        # name-regex only; tag filtering is xcodebuild-only). The full suite
        # (including these) runs in the parallel `swift-integration` job below
        # (issue #364) — promote that job to a required status check so a
        # failing AC test blocks merge. Still run `swift test` locally before
        # merge for fast iteration — see AGENTS.md.
        # To add a slow suite: tag it `.integration` AND append its name here.
        env:
          SKIP: 'EnumeratorDeletionTests|StoreEmissionTests|StoreEmissionReentrancyTests|BlobVacuumTests|AgentCASTests|GenerationGateLaneTests|WorkspaceStagingTests|WorkspaceMergeCompletenessTests|IngestIsolationTests|IngestGateTests|ChatSummaryTests|ProjectionTreeTests|SplitDiffSnapshotTests|FullTextSearchTests|ChatSearchTests|SessionManagerTests|QuoteHighlightWebViewTests'
        run: $SWIFT test --skip "$SKIP"

  swift-integration:
    # Full test suite — including the SQLite integration suites the fast-tier
    # `swift` job skips (issue #364). Runs in parallel so it doesn't slow down
    # PR feedback; promote this job to a required status check in branch
    # protection so a failing AC test blocks merge.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (mlx-swift needs Swift 6.3)
        run: |
          # macos-latest may default the `swift` command to the CLT toolchain
          # (Swift 6.1), but mlx-swift 0.31.x requires 6.3. Force Xcode.
          ls /Applications/Xcode*.app 2>/dev/null
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | tail -1)" || true
          swift --version || xcrun swift --version
      - name: Generate codegen files (version + prompts)
        run: make version prompts
      - name: Build
        run: |
          if xcrun swift build 2>/dev/null; then
            echo "SWIFT=xcrun swift" >> "$GITHUB_ENV"
          else
            swift build
            echo "SWIFT=swift" >> "$GITHUB_ENV"
          fi
      - name: Test (full suite — integration suites included, issue #364)
        # `QueueEngineTests` is skipped here (but NOT in the fast `swift` job):
        # it's a fast, timing-sensitive suite that's fully and reliably covered
        # by the fast tier. It's fundamentally flaky in THIS tier because the
        # heavy CPU-bound SQLite suites hog the cooperative thread pool without
        # yielding, starving the queue engine's worker Tasks (issue #448) — even
        # a 30s timeout wasn't enough. The fast tier (which skips those heavy
        # suites) runs it reliably.
        run: $SWIFT test --skip QueueEngineTests

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pdf2md
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check pdf2md tests/
      - name: Type check
        run: uv run pyright pdf2md tests/
      - name: Unit tests
        run: uv run pytest tests/test_pdf2md.py -v
